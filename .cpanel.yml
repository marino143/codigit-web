---
deployment:
  tasks:
    - export DEPLOYPATH=/home/codihr/public_html/
    - /bin/cp index.html $DEPLOYPATH
    - /bin/cp .htaccess $DEPLOYPATH
    - /bin/cp webhook.php $DEPLOYPATH
    - /bin/cp favicon.svg $DEPLOYPATH
    - /bin/cp contact.php $DEPLOYPATH
    - /bin/cp contact.html $DEPLOYPATH
    - /bin/cp cookie-policy.html $DEPLOYPATH
    - /bin/cp privacy-policy.html $DEPLOYPATH
    - /bin/mkdir -p ${DEPLOYPATH}logos
    - /bin/cp logos/mountmedia.svg ${DEPLOYPATH}logos/
